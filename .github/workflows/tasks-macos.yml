name: MacOS & iOS Releases
run-name: Build & Release for `MacOS` and `iOS`

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  macos-tasks:
    runs-on: macos-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
    
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: stable
    
      - name: Build iOS Release
        run: |
          flutter clean
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=./build/debug-info/
      
      - name: Build MacOS Release
        run: |
         flutter build macos --release --obfuscate --split-debug-info=./build/debug-info/
      
      - uses: ncipollo/release-action@v1
        with:
          name: Test Releases
          tag: "latest"
          allowUpdates: true
          makeLatest: true
          artifacts: ./build/ios/iphoneos/*.app, build/macos/Build/Products/Release/*.app